services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itblog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/migrations:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
